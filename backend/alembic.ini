# Alembic configuration for the SourceCAD backend.
#
# The database URL is intentionally left blank here — env.py resolves it from
# app settings (DATABASE_URL / the dev SQLite default), so migrations always
# target the same database the app uses. A test can override it with
#   config.set_main_option("sqlalchemy.url", ...)
# or the CLI with `-x` / the DATABASE_URL env var.

[alembic]
script_location = alembic
prepend_sys_path = .
# Timestamped, slugged revision filenames, e.g. 2026_06_19_1530-ab12cd_init.py
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s
sqlalchemy.url =

[post_write_hooks]

# --- Logging -------------------------------------------------------------
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
